    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: 'var(--color-primary)',
              secondary: 'var(--color-secondary)',
              background: 'var(--color-background)',
              surface: 'var(--color-surface)',
              keypad: 'var(--color-keypad)',
              'number-key': 'var(--color-number-key)',
              'text-color': 'var(--color-text)',
              'text-muted': 'var(--color-text-muted)',
              'text-on-primary': 'var(--color-text-on-primary)',
              'text-on-secondary': 'var(--color-text-on-secondary)',
            },
            fontFamily: {
              "display": ["Space Grotesk", "sans-serif"]
            },
            animation: {
              'pop-in': 'pop-in 0.4s cubic-bezier(0.4, 1.25, 0.2, 1) forwards',
              'fade-in': 'fade-in 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards',
            },
            keyframes: {
              'pop-in': {
                'from': {
                  transform: 'scale(0.8)',
                  opacity: '0'
                },
                'to': {
                  transform: 'scale(1)',
                  opacity: '1'
                },
              },
              'fade-in': {
                'from': {
                  opacity: '0'
                },
                'to': {
                  opacity: '1'
                },
              },
            },
          },
        },
      }
    </script>

        --color-background: #f1f5f9;
        --color-surface: #ffffff;
        --color-keypad: #e2e8f0;

        --color-text-muted: #475569;
        --color-text-on-primary: #ffffff;
        --color-text-on-secondary: #ffffff;
      }
      .glass-mode body {
        background: var(--glass-background) !important;
        background-attachment: fixed;
        background-size: cover;
      }
      .glass-mode .bg-surface,
      .glass-mode .bg-keypad,
      .glass-mode .bg-number-key {
        backdrop-filter: blur(var(--glass-blur, 20px));
        -webkit-backdrop-filter: blur(var(--glass-blur, 20px));
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: var(--color-secondary);
        border-radius: 20px;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
